# Fine Search | RVL-CDIP | subcenter_arcface_k1
# Gerado automaticamente por analyze_and_build_finesearch.py
# Finalistas do Sweep Grosseiro refinados com method: bayes

program: scripts/training/run_cavl_training.py
method: bayes
run_cap: 10
metric:
  name: val/eer
  goal: minimize

parameters:
  professor-warmup-steps:
    value: 100000
  easy-mining-steps:
    value: 0
  loss-type:
    value: "subcenter_arcface"
  optimizer-type:
    value: "adamw"
  num-sub-centers:
    value: 1
  student-lr:
    distribution: log_uniform_values
    min: 2.75e-05
    max: 4.70e-05
  margin:
    value: 0.2922
  scale:
    value: 32.0

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--use-wandb"
  - "--gradient-accumulation-steps"
  - "4"
  - "--candidate-pool-size"
  - "8"
  - "--student-batch-size"
  - "8"
  - "--dataset-name"
  - "RVL-CDIP"
  - "--val-subset-size"
  - "512"
  - "--pairs-csv"
  - "data/RVL-CDIP/train_pairs.csv"
  - "--base-image-dir"
  - "/mnt/data/zs_rvl_cdip/data"
  - "--epochs"
  - "5"
  - "--weight-decay"
  - "0.05"
  - "--num-workers"
  - "2"
  - "--max-steps-per-epoch"
  - "100"
  - "--model-name"
  - "InternVL3-2B"
  - ${args}
