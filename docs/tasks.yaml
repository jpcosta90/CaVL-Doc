# Tasks Configuration for CaVL-Doc Research
# This is the single source of truth for all research tasks
# It syncs automatically to GitHub Projects via sync_tasks_to_github_project.py

project_config:
  owner: "joaopaulo"  # GitHub username
  repo: "CaVL-Doc"    # Repository name
  project_number: null  # Set this to your GitHub Project number after creation
  
research_questions:
  q1: "Efeito do teacher na LA-CDIP"
  q2: "Robustez por split"
  q3: "Transfer learning no RVL zero-shot"
  q4: "Custo computacional versus ganho de desempenho"

