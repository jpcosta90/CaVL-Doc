    milestone: "Sprint 2"
    tasks:
      T-06-01:
        title: "Executar sweep Bayes por loss com baseline OFF"
        description: |
          Realizar sweep Bayes dos hiperparâmetros do teacher para cada loss finalista.
          - Usar runs da Sprint 1 como base (best_siam)
          - 5 trials Bayes + 1 baseline OFF por loss
          - 3 épocas por experimento
        status: "in-progress"
        priority: "high"
        labels: ["phase:6", "topic:teacher", "status:doing"]
        research_question: "q1"
        evidence: "W&B + CSV de runs"
      
      T-06-02:
        title: "Consolidar melhor configuração teacher"
        description: |
          Analisar resultados do sweep e selecionar a melhor configuração.
          - Gerar report local Sprint 2
          - Documentar ganho em EER
        status: "todo"
        priority: "high"
        labels: ["phase:6", "topic:teacher", "status:todo"]
        research_question: "q1"
        evidence: "Report local Sprint 2"
  
